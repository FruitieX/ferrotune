<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Rust/copper gradient -->
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="50%" style="stop-color:#b45309"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#rust)"/>
  
  <!-- Music2 icon (double note - lucide style) - scaled and centered -->
  <g transform="translate(96, 96) scale(13.33)" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left stem -->
    <path d="M9 18V5"/>
    <!-- Right stem -->
    <path d="M21 16V3"/>
    <!-- Connecting beam -->
    <path d="M9 5l12-2"/>
    <!-- Left note head (hollow) -->
    <circle cx="6" cy="18" r="3"/>
    <!-- Right note head (hollow) -->
    <circle cx="18" cy="16" r="3"/>
  </g>
</svg>
