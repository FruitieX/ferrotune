# Moon project configuration for ferrotune client
# https://moonrepo.dev/docs/config/project

$schema: "https://moonrepo.dev/schemas/project.json"

# Project metadata
project:
  name: "ferrotune-client"
  description: "Modern web client for Ferrotune music server"
  channel: "#ferrotune"

# File groups for task inputs
fileGroups:
  sources:
    - "src/**/*"
    - "public/**/*"
    - "next.config.ts"
    - "tsconfig.json"
    - "package.json"
  plugin-guest-js:
    - "tauri-plugin-native-audio/guest-js/src/**/*"
    - "tauri-plugin-native-audio/guest-js/tsconfig.json"
    - "tauri-plugin-native-audio/guest-js/package.json"
  e2e:
    - "e2e/**/*"
    - "playwright.config.ts"
  styles:
    - "src/**/*.css"
    - "postcss.config.mjs"
    - "components.json"

# Tasks
tasks:
  # ============================================================================
  # SETUP
  # ============================================================================

  install:
    command: "npm install"
    inputs:
      - "package.json"
      - "package-lock.json"
    outputs:
      - "node_modules"

  build-native-audio-api:
    command: "npx tsc -p tauri-plugin-native-audio/guest-js/tsconfig.json"
    inputs:
      - "@group(plugin-guest-js)"
    outputs:
      - "tauri-plugin-native-audio/guest-js/dist"
    deps:
      - "install"

  # ============================================================================
  # DEVELOPMENT
  # ============================================================================

  dev:
    command: "npm run dev"
    inputs:
      - "@group(sources)"
    deps:
      - "install"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      persistent: true
      runInCI: false

  # ============================================================================
  # BUILD
  # ============================================================================

  build:
    command: "npm run build"
    inputs:
      - "@group(sources)"
      - "@group(styles)"
    outputs:
      - ".next"
    deps:
      - "install"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"

  build-export:
    command: "npm run build"
    inputs:
      - "@group(sources)"
      - "@group(styles)"
    outputs:
      - "out"
    deps:
      - "install"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    env:
      NEXT_OUTPUT_STATIC: "1"

  # ============================================================================
  # CODE QUALITY
  # ============================================================================

  lint:
    command: "npx eslint . --max-warnings 0"
    inputs:
      - "eslint.config.mjs"
      - "@group(sources)"
    deps:
      - "install"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"

  typecheck:
    command: "npx tsc --noEmit"
    inputs:
      - "@group(sources)"
      # Include Next.js generated types - cache must invalidate when these change/are missing
      - ".next/types/**/*.ts"
      - ".next-dev/types/**/*.ts"
    deps:
      - "install"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"

  fmt:
    command: "npx prettier --write ."
    inputs:
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"
    options:
      runInCI: false

  fmt-check:
    command: "npx prettier --check ."
    inputs:
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"

  # ============================================================================
  # E2E TESTS
  # ============================================================================

  test:
    command: "npx playwright test"
    inputs:
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"
    env:
      CI: "true"
    options:
      timeout: 600

  test-e2e:
    command: "npx playwright test"
    inputs:
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"
    options:
      timeout: 600

  test-e2e-ui:
    command: "npx playwright test --ui"
    inputs:
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"
    options:
      runInCI: false
      persistent: true

  test-e2e-headed:
    command: "npx playwright test --headed"
    inputs:
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"
    options:
      runInCI: false
      timeout: 600

  test-e2e-debug:
    command: "npx playwright test --debug"
    inputs:
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"
    options:
      runInCI: false
      persistent: true

  # Individual test spec files
  test-auth:
    command: "npx playwright test auth.spec.ts"
    inputs:
      - "@group(sources)"
      - "e2e/auth.spec.ts"
      - "e2e/fixtures.ts"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"

  test-browse:
    command: "npx playwright test browse.spec.ts"
    inputs:
      - "@group(sources)"
      - "e2e/browse.spec.ts"
      - "e2e/fixtures.ts"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"

  test-search:
    command: "npx playwright test search.spec.ts"
    inputs:
      - "@group(sources)"
      - "e2e/search.spec.ts"
      - "e2e/fixtures.ts"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"

  test-playback:
    command: "npx playwright test playback.spec.ts"
    inputs:
      - "@group(sources)"
      - "e2e/playback.spec.ts"
      - "e2e/fixtures.ts"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"

  test-queue:
    command: "npx playwright test queue.spec.ts"
    inputs:
      - "@group(sources)"
      - "e2e/queue.spec.ts"
      - "e2e/fixtures.ts"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"

  test-starring:
    command: "npx playwright test starring.spec.ts"
    inputs:
      - "@group(sources)"
      - "e2e/starring.spec.ts"
      - "e2e/fixtures.ts"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"

  test-playlists:
    command: "npx playwright test playlists.spec.ts"
    inputs:
      - "@group(sources)"
      - "e2e/playlists.spec.ts"
      - "e2e/fixtures.ts"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"

  # ============================================================================
  # PLAYWRIGHT UTILITIES
  # ============================================================================

  playwright-install:
    command: "npx playwright install chromium"
    deps:
      - "install"
    options:
      runInCI: true

  playwright-report:
    command: "npx playwright show-report"
    options:
      runInCI: false
      persistent: true

  # ============================================================================
  # UTILITIES
  # ============================================================================

  clean:
    command: "rm -rf .next node_modules test-results playwright-report"
    options:
      cache: false
      runInCI: false

  start:
    command: "npm run start"
    inputs:
      - ".next"
    deps:
      - "build"
    options:
      persistent: true
      runInCI: false

  # ============================================================================
  # TAURI (Desktop App)
  # ============================================================================

  tauri-check:
    script: "cd src-tauri && cargo check"
    inputs:
      - "src-tauri/**/*"
      - "tauri-plugin-native-audio/src/**/*"
    deps:
      - "install"
    options:
      runInCI: false

  tauri-dev:
    command: "npx tauri dev"
    deps:
      - "install"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      persistent: true
      runInCI: false

  tauri-build:
    command: "npx tauri build"
    inputs:
      - "@group(sources)"
      - "src-tauri/**/*"
      - "tauri-plugin-native-audio/**/*"
    deps:
      - "install"
      - "build-export"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      runInCI: false

  tauri-build-debug:
    command: "npx tauri build -- --debug"
    inputs:
      - "@group(sources)"
      - "src-tauri/**/*"
      - "tauri-plugin-native-audio/**/*"
    deps:
      - "install"
      - "build-export"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      runInCI: false

  tauri-build-release:
    command: "npx tauri build"
    inputs:
      - "@group(sources)"
      - "src-tauri/**/*"
      - "tauri-plugin-native-audio/**/*"
    deps:
      - "install"
      - "build-export"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      runInCI: false

  # ============================================================================
  # TAURI (Android App)
  # ============================================================================

  tauri-android-sync-icons:
    command: "bash scripts/sync-android-icons.sh"
    inputs:
      - "scripts/sync-android-icons.sh"
      - "src-tauri/icons/**/*"
    deps:
      - "install"
    options:
      cache: false
      runInCI: false

  tauri-android-init:
    script: "npx tauri android init && bash scripts/sync-android-icons.sh"
    deps:
      - "install"
    options:
      cache: false
      runInCI: false

  tauri-android-dev:
    command: "npx tauri android dev"
    deps:
      - "install"
      - "tauri-android-sync-icons"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      persistent: true
      runInCI: false

  tauri-android-build:
    command: "npx tauri android build"
    inputs:
      - "@group(sources)"
      - "src-tauri/**/*"
      - "tauri-plugin-native-audio/**/*"
    deps:
      - "install"
      - "tauri-android-sync-icons"
      - "build-export"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      runInCI: false

  tauri-android-build-debug:
    command: "npx tauri android build --debug"
    inputs:
      - "@group(sources)"
      - "src-tauri/**/*"
      - "tauri-plugin-native-audio/**/*"
    deps:
      - "install"
      - "tauri-android-sync-icons"
      - "build-export"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      runInCI: false

  tauri-android-deploy:
    script: "npx tauri android build --debug --config tauri.android-deploy.conf.json && adb -H ${ANDROID_ADB_SERVER_ADDRESS:-127.0.0.1} install -r src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk && adb -H ${ANDROID_ADB_SERVER_ADDRESS:-127.0.0.1} shell am start -S -n com.ferrotune.music/.MainActivity"
    inputs:
      - "@group(sources)"
      - "src-tauri/**/*"
      - "tauri-plugin-native-audio/**/*"
    deps:
      - "install"
      - "tauri-android-sync-icons"
      - "build-export"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    env:
      JAVA_HOME: "${JAVA_HOME}"
      ANDROID_HOME: "${ANDROID_HOME}"
      ANDROID_SDK_ROOT: "${ANDROID_SDK_ROOT}"
      NDK_HOME: "${NDK_HOME}"
      ANDROID_ADB_SERVER_ADDRESS: "${ANDROID_ADB_SERVER_ADDRESS}"
    options:
      runInCI: false
      cache: false

  tauri-android-clean-daemons:
    command: "bash"
    args: "scripts/clean-android-daemons.sh"
    env:
      JAVA_HOME: "${JAVA_HOME}"
    options:
      runInCI: false
      cache: false

  # ============================================================================
  # CI PIPELINE
  # ============================================================================

  # Lite CI without E2E tests (for faster CI when E2E is disabled)
  ci-lite:
    deps:
      - "fmt-check"
      - "lint"
      - "typecheck"
      - "build"

  # Full CI including E2E tests
  ci:
    deps:
      - "ci-lite"
      - "test-e2e"

  pre-ci:
    deps:
      - "fmt"
      - "lint"
      - "typecheck"
      - "build"
      - "test-e2e"
    options:
      runInCI: false
