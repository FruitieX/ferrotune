# Moon project configuration for ferrotune client
# https://moonrepo.dev/docs/config/project

$schema: "https://moonrepo.dev/schemas/project.json"

# Project metadata
project:
  name: "ferrotune-client"
  description: "Modern web client for Ferrotune music server"
  channel: "#ferrotune"

# File groups for task inputs
fileGroups:
  sources:
    - "src/**/*"
    - "public/**/*"
    - "index.html"
    - "vite.config.ts"
    - "tsconfig.json"
    - "package.json"
  plugin-guest-js:
    - "tauri-plugin-native-audio/guest-js/src/**/*"
    - "tauri-plugin-native-audio/guest-js/tsconfig.json"
    - "tauri-plugin-native-audio/guest-js/package.json"
  e2e:
    - "e2e/**/*"
    - "playwright.config.ts"
  styles:
    - "src/**/*.css"
    - "postcss.config.mjs"
    - "components.json"

# Tasks
tasks:
  # ============================================================================
  # SETUP
  # ============================================================================

  install:
    command: "pnpm install"
    inputs:
      - "package.json"
      - "pnpm-lock.yaml"
    # NOTE: intentionally no outputs - moon's archive follows symlinks in
    # node_modules (the pnpm link: to guest-js), which causes source files
    # to be overwritten with stale cached versions on restore. pnpm's own
    # caching makes re-installs fast when the lockfile hasn't changed.
    options:
      cache: false

  build-native-audio-api:
    command: "pnpm exec tsc -p tauri-plugin-native-audio/guest-js/tsconfig.json"
    inputs:
      - "@group(plugin-guest-js)"
    outputs:
      - "tauri-plugin-native-audio/guest-js/dist"
    deps:
      - "install"

  # ============================================================================
  # DEVELOPMENT
  # ============================================================================

  dev:
    command: "pnpm run dev"
    inputs:
      - "@group(sources)"
    deps:
      - "install"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      persistent: true
      runInCI: false

  # ============================================================================
  # BUILD
  # ============================================================================

  build:
    command: "pnpm run build"
    inputs:
      - "@group(sources)"
      - "@group(styles)"
    outputs:
      - "out"
    deps:
      - "install"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"

  build-export:
    command: "pnpm run build"
    inputs:
      - "@group(sources)"
      - "@group(styles)"
    outputs:
      - "out"
    deps:
      - "install"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"

  # ============================================================================
  # CODE QUALITY
  # ============================================================================

  lint:
    command: "pnpm exec eslint . --max-warnings 0"
    inputs:
      - "eslint.config.mjs"
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"
      - "build-native-audio-api"

  typecheck:
    command: "pnpm exec tsc --noEmit"
    inputs:
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"

  fmt:
    command: "pnpm exec prettier --write ."
    inputs:
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"
    options:
      runInCI: false

  fmt-check:
    command: "pnpm exec prettier --check ."
    inputs:
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"

  # ============================================================================
  # E2E TESTS
  # ============================================================================

  test:
    command: "pnpm exec playwright test"
    inputs:
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"
    env:
      CI: "true"
    options:
      timeout: 600

  test-e2e:
    command: "pnpm exec playwright test"
    inputs:
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"
    options:
      timeout: 600

  test-e2e-ui:
    command: "pnpm exec playwright test --ui"
    inputs:
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"
    options:
      runInCI: false
      persistent: true

  test-e2e-headed:
    command: "pnpm exec playwright test --headed"
    inputs:
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"
    options:
      runInCI: false
      timeout: 600

  test-e2e-debug:
    command: "pnpm exec playwright test --debug"
    inputs:
      - "@group(sources)"
      - "@group(e2e)"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"
    options:
      runInCI: false
      persistent: true

  test-android-emulator:
    command: "pnpm exec playwright test e2e/android-emulator.spec.ts --project android-emulator"
    inputs:
      - "e2e/android-emulator.spec.ts"
      - "e2e/app-helpers.ts"
      - "e2e/queue-helpers.ts"
      - "e2e/fixtures.ts"
      - "playwright.config.ts"
    deps:
      - "install"
      - "playwright-install"
      - "tauri-android-deploy-debug"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"
    env:
      FERROTUNE_ANDROID_E2E: "true"
    options:
      runInCI: false
      timeout: 900
      cache: false

  # Individual test spec files
  test-auth:
    command: "pnpm exec playwright test auth.spec.ts"
    inputs:
      - "@group(sources)"
      - "e2e/auth.spec.ts"
      - "e2e/fixtures.ts"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"

  test-browse:
    command: "pnpm exec playwright test browse.spec.ts"
    inputs:
      - "@group(sources)"
      - "e2e/browse.spec.ts"
      - "e2e/fixtures.ts"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"

  test-search:
    command: "pnpm exec playwright test search.spec.ts"
    inputs:
      - "@group(sources)"
      - "e2e/search.spec.ts"
      - "e2e/fixtures.ts"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"

  test-playback:
    command: "pnpm exec playwright test playback.spec.ts"
    inputs:
      - "@group(sources)"
      - "e2e/playback.spec.ts"
      - "e2e/fixtures.ts"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"

  test-queue:
    command: "pnpm exec playwright test queue.spec.ts"
    inputs:
      - "@group(sources)"
      - "e2e/queue.spec.ts"
      - "e2e/fixtures.ts"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"

  test-starring:
    command: "pnpm exec playwright test starring.spec.ts"
    inputs:
      - "@group(sources)"
      - "e2e/starring.spec.ts"
      - "e2e/fixtures.ts"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"

  test-playlists:
    command: "pnpm exec playwright test playlists.spec.ts"
    inputs:
      - "@group(sources)"
      - "e2e/playlists.spec.ts"
      - "e2e/fixtures.ts"
    deps:
      - "install"
      - "build"
      - "playwright-install"
      - "ferrotune:build"
      - "ferrotune:generate-fixtures"

  # ============================================================================
  # PLAYWRIGHT UTILITIES
  # ============================================================================

  playwright-install:
    command: "pnpm exec playwright install chromium"
    deps:
      - "install"
    options:
      runInCI: true

  playwright-report:
    command: "pnpm exec playwright show-report"
    options:
      runInCI: false
      persistent: true

  # ============================================================================
  # UTILITIES
  # ============================================================================

  clean:
    command: "rm -rf out node_modules test-results playwright-report"
    options:
      cache: false
      runInCI: false

  start:
    command: "pnpm run start"
    inputs:
      - "out"
    deps:
      - "build"
    options:
      persistent: true
      runInCI: false

  # ============================================================================
  # TAURI (Desktop App)
  # ============================================================================

  tauri-check:
    script: "cd src-tauri && cargo check"
    inputs:
      - "src-tauri/**/*"
      - "tauri-plugin-native-audio/src/**/*"
    deps:
      - "install"
    options:
      runInCI: false

  tauri-dev:
    command: "pnpm exec tauri dev"
    deps:
      - "install"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      persistent: true
      runInCI: false

  tauri-build:
    command: "pnpm exec tauri build"
    inputs:
      - "@group(sources)"
      - "src-tauri/**/*"
      - "tauri-plugin-native-audio/**/*"
    deps:
      - "install"
      - "build-export"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      runInCI: false

  tauri-build-debug:
    command: "pnpm exec tauri build -- --debug"
    inputs:
      - "@group(sources)"
      - "src-tauri/**/*"
      - "tauri-plugin-native-audio/**/*"
    deps:
      - "install"
      - "build-export"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      runInCI: false

  tauri-build-release:
    command: "pnpm exec tauri build"
    inputs:
      - "@group(sources)"
      - "src-tauri/**/*"
      - "tauri-plugin-native-audio/**/*"
    deps:
      - "install"
      - "build-export"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      runInCI: false

  # ============================================================================
  # TAURI (Android App)
  # ============================================================================

  tauri-android-sync-icons:
    command: "bash scripts/sync-android-icons.sh"
    inputs:
      - "scripts/sync-android-icons.sh"
      - "src-tauri/icons/**/*"
    deps:
      - "install"
    options:
      cache: false
      runInCI: false

  tauri-android-init:
    script: "pnpm exec tauri android init && bash scripts/sync-android-icons.sh"
    deps:
      - "install"
    options:
      cache: false
      runInCI: false

  tauri-android-dev:
    command: "pnpm exec tauri android dev"
    deps:
      - "install"
      - "tauri-android-sync-icons"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      persistent: true
      runInCI: false

  tauri-android-build:
    command: "pnpm exec tauri android build"
    inputs:
      - "@group(sources)"
      - "src-tauri/**/*"
      - "tauri-plugin-native-audio/**/*"
    deps:
      - "install"
      - "tauri-android-sync-icons"
      - "build-export"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      runInCI: false

  tauri-android-build-debug:
    command: "pnpm exec tauri android build --debug"
    inputs:
      - "@group(sources)"
      - "src-tauri/**/*"
      - "tauri-plugin-native-audio/**/*"
    deps:
      - "install"
      - "tauri-android-sync-icons"
      - "build-export"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    options:
      runInCI: false

  tauri-android-deploy:
    script: "pnpm exec tauri android build --target aarch64 --config tauri.android-deploy.conf.json && APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -1) && $APKSIGNER sign --ks $HOME/.android/debug.keystore --ks-pass pass:android --ks-key-alias androiddebugkey --key-pass pass:android src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk && adb -H ${ANDROID_ADB_SERVER_ADDRESS:-127.0.0.1} install -r src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk && adb -H ${ANDROID_ADB_SERVER_ADDRESS:-127.0.0.1} shell am start -S -n com.ferrotune.music/.MainActivity"
    inputs:
      - "@group(sources)"
      - "src-tauri/**/*"
      - "tauri-plugin-native-audio/**/*"
    deps:
      - "install"
      - "tauri-android-sync-icons"
      - "build-export"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    env:
      JAVA_HOME: "${JAVA_HOME}"
      ANDROID_HOME: "${ANDROID_HOME}"
      ANDROID_SDK_ROOT: "${ANDROID_SDK_ROOT}"
      NDK_HOME: "${NDK_HOME}"
      ANDROID_ADB_SERVER_ADDRESS: "${ANDROID_ADB_SERVER_ADDRESS}"
    options:
      runInCI: false
      cache: false

  tauri-android-deploy-debug:
    script: "pnpm exec tauri android build --debug --target aarch64 --config tauri.android-deploy.conf.json && adb -H ${ANDROID_ADB_SERVER_ADDRESS:-127.0.0.1} install -r src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk && adb -H ${ANDROID_ADB_SERVER_ADDRESS:-127.0.0.1} shell am start -S -n com.ferrotune.music/.MainActivity"
    inputs:
      - "@group(sources)"
      - "src-tauri/**/*"
      - "tauri-plugin-native-audio/**/*"
    deps:
      - "install"
      - "tauri-android-sync-icons"
      - "build-export"
      - "build-native-audio-api"
      - "ferrotune:generate-bindings"
    env:
      JAVA_HOME: "${JAVA_HOME}"
      ANDROID_HOME: "${ANDROID_HOME}"
      ANDROID_SDK_ROOT: "${ANDROID_SDK_ROOT}"
      NDK_HOME: "${NDK_HOME}"
      ANDROID_ADB_SERVER_ADDRESS: "${ANDROID_ADB_SERVER_ADDRESS}"
    options:
      runInCI: false
      cache: false

  tauri-android-clean-daemons:
    command: "bash"
    args: "scripts/clean-android-daemons.sh"
    env:
      JAVA_HOME: "${JAVA_HOME}"
    options:
      runInCI: false
      cache: false

  # ============================================================================
  # CI PIPELINE
  # ============================================================================

  # Lite CI without E2E tests (for faster CI when E2E is disabled)
  ci-lite:
    deps:
      - "fmt-check"
      - "lint"
      - "typecheck"
      - "build"

  # Full CI including E2E tests
  ci:
    deps:
      - "ci-lite"
      - "test-e2e"

  pre-ci:
    deps:
      - "fmt"
      - "lint"
      - "typecheck"
      - "build"
      - "test-e2e"
    options:
      runInCI: false
