[server]
host = "127.0.0.1"
port = 4040
admin_port = 4041
name = "Ferrotune"
admin_user = "admin"
admin_password = "your-secure-password"

[database]
path = "~/.local/share/ferrotune/ferrotune.db"

[music]
readonly_tags = true

[[music.folders]]
name = "Music"
path = "~/ferrotune-library"

# Add more folders as needed
# [[music.folders]]
# name = "More Music"
# path = "/path/to/more/music"

[cache]
path = "~/.cache/ferrotune"
max_cover_size = 1024
# Store byte-range-addressable transcoded streams here. Point this at an
# ephemeral volume in container deployments.
# Configless/container deployments can use FERROTUNE_TRANSCODE_CACHE_PATH and
# FERROTUNE_TRANSCODE_CACHE_MAX_MB instead of this TOML section.
transcode_path = "/tmp/ferrotune/transcodes"
max_transcode_size_mb = 10240
