name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_TERM_COLOR: always

jobs:
  backend:
    name: Backend (${{ matrix.database }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database: [sqlite, postgres]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Swatinem/rust-cache@v2
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Install Hurl
        run: |
          curl -LO https://github.com/Orange-OpenSource/hurl/releases/download/6.0.0/hurl_6.0.0_amd64.deb
          sudo apt-get install -y ./hurl_6.0.0_amd64.deb
      - name: Install ffmpeg for test fixtures
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install libopus dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake
      - run: moon run ferrotune:ci${{ matrix.database == 'postgres' && '-postgres' || '' }}

  client:
    name: Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Swatinem/rust-cache@v2
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Install ffmpeg for test fixtures
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install libopus dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake
      - name: Install Playwright browsers
        run: moon run client:playwright-install -- --with-deps
      - run: moon run client:ci

  e2e-tests:
    if: false
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Swatinem/rust-cache@v2
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Install Playwright browsers
        run: moon run client:playwright-install -- --with-deps
      - name: Install ffmpeg for test fixtures
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install libopus dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake
      - run: moon run client:test-e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7

  build-image:
    name: Build & (optionally) push image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libclang-dev

      - uses: Swatinem/rust-cache@v2

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Build Next.js client (static export)
        run: moon run client:build-export

      - name: Build binary (musl)
        run: moon run ferrotune:build-release-musl

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build (and push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to homelab
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMELAB_DISPATCH_TOKEN }}
          repository: FruitieX/homelab
          event-type: image-update
          client-payload: |
            {
              "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",
              "digest": "${{ steps.build.outputs.digest }}"
            }
