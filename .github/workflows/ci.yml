name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_TERM_COLOR: always

jobs:
  backend:
    name: Backend (${{ matrix.database }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database: [sqlite, postgres]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Swatinem/rust-cache@v2
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Install Hurl
        run: |
          curl -LO https://github.com/Orange-OpenSource/hurl/releases/download/6.0.0/hurl_6.0.0_amd64.deb
          sudo apt-get install -y ./hurl_6.0.0_amd64.deb
      - name: Install ffmpeg for test fixtures
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libclang-dev libopus-dev ninja-build pkg-config
      - name: Run backend CI
        run: env -u FERROTUNE_DATABASE_URL moon run ferrotune:ci${{ matrix.database == 'postgres' && '-postgres' || '' }}

  client:
    name: Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Swatinem/rust-cache@v2
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Install ffmpeg for test fixtures
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libclang-dev libopus-dev ninja-build pkg-config
      - name: Install Playwright browsers
        run: moon run client:playwright-install -- --with-deps
      - name: Run client CI
        run: env -u FERROTUNE_DATABASE_URL moon run client:ci
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: |
            client/playwright-report/
            client/test-results/
          if-no-files-found: ignore
          retention-days: 7

  build-image:
    name: Build & (optionally) push image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libclang-dev libopus-dev ninja-build pkg-config

      - uses: Swatinem/rust-cache@v2

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Build Vite client
        run: moon run client:build-export

      - name: Build binary (musl)
        run: moon run ferrotune:build-release-musl

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build (and push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to homelab
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMELAB_DISPATCH_TOKEN }}
          repository: FruitieX/homelab
          event-type: image-update
          client-payload: |
            {
              "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",
              "digest": "${{ steps.build.outputs.digest }}"
            }

  prepare-app-release:
    name: Prepare app release
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - backend
      - client
      - build-image
    outputs:
      version_name: ${{ steps.metadata.outputs.version_name }}
      version_code: ${{ steps.metadata.outputs.version_code }}
      short_sha: ${{ steps.metadata.outputs.short_sha }}
      asset_version: ${{ steps.metadata.outputs.asset_version }}
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      release_name: ${{ steps.metadata.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: metadata
        name: Prepare metadata
        run: bash .github/scripts/prepare-app-release-metadata.sh

  android-app:
    name: Android APK
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - prepare-app-release
    env:
      FERROTUNE_APP_VERSION_NAME: ${{ needs.prepare-app-release.outputs.version_name }}
      FERROTUNE_ANDROID_VERSION_CODE: ${{ needs.prepare-app-release.outputs.version_code }}
      FERROTUNE_ASSET_VERSION: ${{ needs.prepare-app-release.outputs.asset_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare Tauri Android CI config
        run: bash .github/scripts/write-tauri-ci-config.sh client/tauri.android-ci.conf.json
      - name: Build Android APK
        run: nix develop .#android -c moon run client:tauri-android-build-ci
      - name: Sign Android APK
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          mkdir -p app-release/android
          nix develop .#android -c bash .github/scripts/sign-android-apk.sh \
            client/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk \
            "app-release/android/ferrotune-android-universal-${FERROTUNE_ASSET_VERSION}.apk"
      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferrotune-android-${{ needs.prepare-app-release.outputs.asset_version }}
          path: app-release/android/*.apk
          if-no-files-found: error
          retention-days: 14

  desktop-app:
    name: Desktop app (${{ matrix.platform }})
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    needs:
      - prepare-app-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-latest
    env:
      FERROTUNE_APP_VERSION_NAME: ${{ needs.prepare-app-release.outputs.version_name }}
      FERROTUNE_ANDROID_VERSION_CODE: ${{ needs.prepare-app-release.outputs.version_code }}
      FERROTUNE_ASSET_VERSION: ${{ needs.prepare-app-release.outputs.asset_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            client/src-tauri -> target
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            ffmpeg \
            file \
            libayatana-appindicator3-dev \
            libclang-dev \
            libgtk-3-dev \
            libopus-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            ninja-build \
            patchelf \
            pkg-config \
            wget
      - name: Install Windows desktop dependencies
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          choco install cmake llvm ffmpeg ninja -y
          echo 'LIBCLANG_PATH=C:\Program Files\LLVM\bin' >> "$GITHUB_ENV"
      - name: Install macOS desktop dependencies
        if: matrix.platform == 'macos'
        run: |
          brew install cmake ffmpeg llvm ninja opus pkg-config
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"
      - name: Prepare Tauri desktop CI config
        shell: bash
        run: bash .github/scripts/write-tauri-ci-config.sh client/tauri.ci.conf.json
      - name: Build desktop app
        shell: bash
        run: moon run client:tauri-build-release-ci
      - name: Collect desktop artifacts
        shell: bash
        run: |
          bash .github/scripts/collect-tauri-artifacts.sh \
            client/src-tauri/target/release/bundle \
            app-release/desktop \
            "${{ matrix.platform }}" \
            "${FERROTUNE_ASSET_VERSION}"
      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferrotune-desktop-${{ matrix.platform }}-${{ needs.prepare-app-release.outputs.asset_version }}
          path: app-release/desktop/*
          if-no-files-found: error
          retention-days: 14

  publish-app-release:
    name: Publish app prerelease
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - prepare-app-release
      - android-app
      - desktop-app
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FERROTUNE_APP_VERSION_NAME: ${{ needs.prepare-app-release.outputs.version_name }}
      FERROTUNE_ANDROID_VERSION_CODE: ${{ needs.prepare-app-release.outputs.version_code }}
      FERROTUNE_ASSET_VERSION: ${{ needs.prepare-app-release.outputs.asset_version }}
      FERROTUNE_RELEASE_TAG: ${{ needs.prepare-app-release.outputs.tag_name }}
      FERROTUNE_RELEASE_NAME: ${{ needs.prepare-app-release.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download app artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ferrotune-*-${{ needs.prepare-app-release.outputs.asset_version }}
          path: app-release/assets
          merge-multiple: true
      - name: Write release notes
        run: bash .github/scripts/write-app-release-notes.sh app-release/release-notes.md
      - name: Publish prerelease
        run: |
          if gh release view "$FERROTUNE_RELEASE_TAG" >/dev/null 2>&1; then
            gh release delete "$FERROTUNE_RELEASE_TAG" --yes --cleanup-tag
          fi

          mapfile -t assets < <(find app-release/assets -type f | sort)
          if (( ${#assets[@]} == 0 )); then
            echo "No app release assets were downloaded" >&2
            exit 1
          fi

          gh release create "$FERROTUNE_RELEASE_TAG" \
            "${assets[@]}" \
            --target "$GITHUB_SHA" \
            --title "$FERROTUNE_RELEASE_NAME" \
            --notes-file app-release/release-notes.md \
            --prerelease
      - name: Remove old app prereleases
        run: bash .github/scripts/cleanup-app-prereleases.sh 10
