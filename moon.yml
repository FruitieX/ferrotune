# Moon project configuration for ferrotune
# https://moonrepo.dev/docs/config/project

$schema: 'https://moonrepo.dev/schemas/project.json'

# Project metadata
project:
  name: 'ferrotune'
  description: 'A Subsonic-compatible music server written in Rust'
  channel: '#ferrotune'

# File groups for task inputs
fileGroups:
  sources:
    - 'src/**/*'
    - 'migrations/**/*'
    - 'Cargo.toml'
    - 'Cargo.lock'
  tests:
    - 'tests/**/*'
  fixtures:
    - 'tests/fixtures/**/*'
  hurl:
    - 'tests/hurl/**/*.hurl'

# Tasks
tasks:
  # ============================================================================
  # BUILD TASKS
  # ============================================================================

  check:
    command: 'cargo check'
    inputs:
      - '@group(sources)'
    options:
      mutex: 'cargo'
  
  build:
    command: 'cargo build'
    inputs:
      - '@group(sources)'
    outputs:
      - 'target/debug/ferrotune'
    options:
      mutex: 'cargo'

  build-release:
    command: 'cargo build --release'
    inputs:
      - '@group(sources)'
    outputs:
      - 'target/release/ferrotune'
    options:
      mutex: 'cargo'

  build-release-musl:
    command: 'cargo build --release --features embedded-ui --target x86_64-unknown-linux-musl'
    inputs:
      - '@group(sources)'
      - 'client/out/**/*'
    outputs:
      - 'target/x86_64-unknown-linux-musl/release/ferrotune'
    deps:
      - 'client:build-export'

  build-release-ui:
    command: 'cargo build --release --features embedded-ui'
    inputs:
      - '@group(sources)'
      - 'client/src/**/*'
      - 'client/package.json'
    outputs:
      - 'target/release/ferrotune'
      - 'client/out/**/*'
    deps:
      - 'client:build-export'

  install:
    command: 'cargo install --path . --features embedded-ui'
    inputs:
      - '@group(sources)'
      - 'client/src/**/*'
      - 'client/package.json'
    deps:
      - 'client:build-export'
    options:
      mutex: 'cargo'

  install-no-ui:
    command: 'cargo install --path .'
    inputs:
      - '@group(sources)'
    options:
      mutex: 'cargo'

  # ============================================================================
  # TEST TASKS
  # ============================================================================

  test:
    command: 'cargo test'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
    deps:
      - 'build'
    options:
      mutex: 'cargo'

  test-unit:
    command: 'cargo test --lib'
    inputs:
      - '@group(sources)'
    deps:
      - 'build'
    options:
      mutex: 'cargo'

  # ============================================================================
  # FIXTURE GENERATION
  # ============================================================================

  generate-fixtures:
    command: 'bash scripts/generate-test-fixtures.sh'
    inputs:
      - 'scripts/generate-test-fixtures.sh'
    outputs:
      - 'tests/fixtures/music/**/*'
    options:
      # Allow running in CI as it's a test dependency
      runInCI: true

  # ============================================================================
  # INTEGRATION TESTS
  # ============================================================================

  test-integration:
    command: 'cargo test --test integration'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(hurl)'
      - '@group(fixtures)'
    deps:
      - 'build'
      - 'generate-fixtures'
    options:
      # Integration tests take longer
      timeout: 300
      mutex: 'cargo'

  test-integration-full:
    command: 'cargo test --test integration -- --ignored'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(hurl)'
      - '@group(fixtures)'
    deps:
      - 'build'
      - 'generate-fixtures'
    options:
      timeout: 600
      mutex: 'cargo'

  # Run a single integration test by name (uses auto-discovery):
  #   cargo test --test integration 01_system
  #   cargo test --test integration browse
  #   cargo test --test integration tagger

  # ============================================================================
  # TYPE GENERATION
  # ============================================================================

  generate-bindings:
    command: 'bash scripts/generate-ts-bindings.sh'
    inputs:
      - '@group(sources)'
      - 'scripts/generate-ts-bindings.sh'
    outputs:
      - 'client/src/lib/api/generated/**/*'

  # ============================================================================
  # CODE QUALITY
  # ============================================================================

  lint:
    command: 'cargo clippy -- -D warnings'
    inputs:
      - '@group(sources)'
    options:
      mutex: 'cargo'

  fmt:
    command: 'cargo fmt'
    inputs:
      - '@group(sources)'
    options:
      runInCI: false
      mutex: 'cargo'

  fmt-check:
    command: 'cargo fmt -- --check'
    inputs:
      - '@group(sources)'
    options:
      mutex: 'cargo'

  # ============================================================================
  # UTILITIES
  # ============================================================================

  clean:
    command: 'cargo clean'
    options:
      cache: false
      runInCI: false

  dev:
    command: 'cargo run -- serve'
    inputs:
      - '@group(sources)'
    local: true
    options:
      persistent: true
      runInCI: false

  serve:
    command: 'cargo run -- serve'
    inputs:
      - '@group(sources)'
    deps:
      - 'build'
    options:
      persistent: true
      runInCI: false

  serve-release:
    command: './target/release/ferrotune serve'
    inputs:
      - '@group(sources)'
      - 'client/src/**/*'
      - 'client/package.json'
    deps:
      - 'build-release-ui'
    options:
      persistent: true
      runInCI: false

  scan:
    command: 'cargo run -- scan'
    inputs:
      - '@group(sources)'
    deps:
      - 'build'
    options:
      runInCI: false

  # ============================================================================
  # CI PIPELINE
  # ============================================================================

  ci:
    deps:
      - 'fmt-check'
      - 'lint'
      - 'test'
      - 'test-integration'

  # ============================================================================
  # FULL STACK CI (includes client)
  # ============================================================================

  # Lite CI without E2E tests (for faster CI when E2E is disabled)
  ci-all-lite:
    deps:
      - 'ci'
      - 'client:ci-lite'

  # Full CI including E2E tests
  ci-all:
    deps:
      - 'ci'
      - 'client:ci'

  pre-ci:
    deps:
      - 'fmt'
      - 'lint'
      - 'test'
      - 'test-integration'
      - 'client:pre-ci'
    options:
      runInCI: false
